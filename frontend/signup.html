<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | My App</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-sm border border-slate-100">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-2 text-center">Create Account</h2>
        <p class="text-slate-500 text-center mb-8 text-sm">Join us today! It only takes a minute.</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Username</label>
                <input type="text" id="reg-user" placeholder="Choose a username" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Password</label>
                <input type="password" id="reg-pass" placeholder="Create a password" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:outline-none transition-all">
            </div>

            <button onclick="handleSignup()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-indigo-200 transition-all active:scale-[0.98]">
                Create Account
            </button>
        </div>

        <p class="text-center text-slate-500 mt-8 text-sm font-medium">
            Already have an account? <a href="index.html" class="text-indigo-600 hover:text-indigo-800 underline underline-offset-4">Login here</a>
        </p>
    </div>

    <script>
        async function handleSignup() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;

            if (!user || !pass) {
                alert("Please fill in all fields");
                return;
            }

            const res = await fetch('http://localhost:5000/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await res.json();
            if (data.success) {
                alert("Account created! Redirecting to login...");
                window.location.href = "index.html";
            } else {
                alert("Error: " + data.message);
            }
        }
    </script>
</body>
</html>
