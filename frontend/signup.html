<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 1. VIEWPORT ZOOM FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up | My App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 2. CSS ZOOM & LAYOUT FIXES */
        html, body { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
            position: fixed; 
            touch-action: none; 
            -webkit-text-size-adjust: 100%; 
        }
        .blob-wrapper { position: fixed; inset: 0; z-index: -1; overflow: hidden; filter: blur(80px); }
        .blob { position: absolute; width: 500px; height: 500px; border-radius: 50%; opacity: 0.3; animation: float 20s infinite alternate ease-in-out; }
        .blob-1 { background: #6366f1; top: -10%; left: -10%; }
        .blob-2 { background: #a855f7; bottom: -10%; right: -10%; animation-duration: 25s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5vw, 10vh) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.6) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4) !important; }
        .valid { color: #10b981; } 
        .invalid { color: #94a3b8; }
        
        /* Prevents font-zoom on mobile */
        input { font-size: 16px !important; }
    </style>
</head>
<body class="flex items-center justify-center font-sans">
    <div class="blob-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm mx-4">
        <h2 class="text-4xl font-black text-slate-800 mb-2 text-center tracking-tighter italic">Join Us.</h2>
        <p class="text-center text-slate-500 text-xs font-bold uppercase tracking-widest mb-8">Create your account</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-widest">Username</label>
                <input type="text" id="reg-user" placeholder="Choose a name" class="w-full px-5 py-4 bg-white/50 border border-white/60 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-widest">Password</label>
                <input type="password" id="reg-pass" onkeyup="validate()" placeholder="••••••••" class="w-full px-5 py-4 bg-white/50 border border-white/60 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium">
                <div class="mt-4 ml-1 space-y-1.5">
                    <p id="r-len" class="text-[9px] font-black invalid tracking-wider transition-colors uppercase">● 8-15 Characters</p>
                    <p id="r-up" class="text-[9px] font-black invalid tracking-wider transition-colors uppercase">● One Uppercase</p>
                    <p id="r-sp" class="text-[9px] font-black invalid tracking-wider transition-colors uppercase">● One Special Char</p>
                </div>
            </div>
            
            <button onclick="handleSignup()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] uppercase text-xs tracking-widest mt-4">Create Account</button>
            
            <p class="text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-6">
                Already have an account? <a href="index.html" class="text-indigo-600 hover:underline">Log In</a>
            </p>
        </div>
    </div>

    <script>
        // 3. JAVASCRIPT ZOOM BLOCKERS
        window.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) e.preventDefault();
        });

        function validate() {
            const p = document.getElementById('reg-pass').value;
            const l = p.length >= 8 && p.length <= 15;
            const u = /[A-Z]/.test(p);
            const s = /[!@#$%^&*]/.test(p);

            const updateClass = (id, isValid) => {
                const el = document.getElementById(id);
                el.className = `text-[9px] font-black tracking-wider transition-colors uppercase ${isValid ? 'valid' : 'invalid'}`;
            };

            updateClass('r-len', l);
            updateClass('r-up', u);
            updateClass('r-sp', s);

            return l && u && s;
        }

        async function handleSignup() {
            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value;

            if (!user) return alert("Please enter a username");
            if (!validate()) return alert("Password does not meet requirements!");

            try {
                const res = await fetch('http://localhost:5001/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const contentType = res.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    const data = await res.json();
                    if (data.success) {
                        alert("Welcome! Account created successfully.");
                        window.location.href = "index.html"; 
                    } else {
                        alert(data.message || "Signup failed");
                    }
                } else {
                    alert("Error: Server sent back HTML instead of JSON. Check your server console.");
                }

            } catch (err) {
                console.error("Signup Error:", err);
                alert("Cannot connect to server. Ensure server.js is running.");
            }
        }
    </script>
</body>
</html>
