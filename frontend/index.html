<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | My App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. CSS ZOOM FIXES */
        html, body { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
            position: fixed; 
            touch-action: none; 
            -webkit-text-size-adjust: 100%; 
        }

        .blob-wrapper { position: fixed; inset: 0; z-index: -1; overflow: hidden; filter: blur(80px); }
        .blob { position: absolute; width: 500px; height: 500px; border-radius: 50%; opacity: 0.3; animation: float 20s infinite alternate ease-in-out; }
        .blob-1 { background: #6366f1; top: -10%; left: -10%; }
        .blob-2 { background: #a855f7; bottom: -10%; right: -10%; animation-duration: 25s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5vw, 10vh) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.6) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4) !important; }
        
        input { font-size: 16px !important; } 
    </style>
</head>
<body class="flex items-center justify-center font-sans">
    <div class="blob-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- LOGOUT TOAST -->
    <div id="toastContainer" class="hidden fixed top-10 z-50 flex justify-center w-full pointer-events-none">
        <div class="bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold animate-bounce">
            Logged out successfully!
        </div>
    </div>

    <div class="glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm mx-4">
        <h2 class="text-4xl font-black text-slate-800 mb-2 text-center tracking-tighter italic">Hello.</h2>
        <p class="text-center text-slate-500 text-xs font-bold uppercase tracking-widest mb-8">Sign in to your account</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-widest">Username</label>
                <input type="text" id="login-user" placeholder="Your name" class="w-full px-5 py-4 bg-white/50 border border-white/60 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-widest">Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" class="w-full px-5 py-4 bg-white/50 border border-white/60 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] uppercase text-xs tracking-widest mt-4">Login</button>
            
            <p class="text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-6">
                New here? <a href="signup.html" class="text-indigo-600 hover:underline">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        // Check for logout status on load
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('status') === 'logout') {
                const toast = document.getElementById('toastContainer');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 3000);
                // Clear URL parameters
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };

        // ZOOM BLOCKERS
        window.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) e.preventDefault();
        });

        async function handleLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;

            if (!user || !pass) return alert("Please fill in all fields");

            try {
                const res = await fetch('http://localhost:5001/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user);
                    // Redirect with login status
                    window.location.href = "dashboard.html?status=login";
                } else {
                    alert(data.message || "Invalid credentials");
                }
            } catch (err) {
                alert("Cannot connect to server. Ensure server.js is running.");
            }
        }
    </script>
</body>
</html>
